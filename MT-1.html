<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Pattern Generator</title>
  <link rel="stylesheet" href="MT-1.css">
</head>
<body>

    <h1>Number Pattern Generator</h1>
